plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// Load . env file
def envFile = rootProject.file("../../.env")
def envProperties = new Properties()
if (envFile.exists()) {
    envFile.withInputStream { envProperties.load(it) }
}

android {
    namespace = "com.cameroon.localizy"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion. VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId = "com.cameroon.localizy"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        def secretsPropertiesFile = rootProject.file("secrets.properties")
        def secretsProperties = new Properties()
        if (secretsPropertiesFile.exists()) {
            secretsPropertiesFile.withReader('UTF-8') { reader ->
                secretsProperties.load(reader)
            }
        }
        
        manifestPlaceholders = [
            GOOGLE_MAPS_API_KEY_ANDROID: secretsProperties['GOOGLE_MAPS_API_KEY_ANDROID'] ?: ""
        ]
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}


dependencies {
    implementation 'com.google.android.gms:play-services-mlkit-text-recognition:19.0.0'
    implementation 'com.google.mlkit:text-recognition:16.0.0'
    implementation 'com.google.android.play:core:1.10.3'
}
