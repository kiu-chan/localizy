name: localizy
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.1+2

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  geolocator: ^14.0.2
  google_maps_flutter: ^2.14.0
  intl: ^0.20.2
  location: ^8.0.1
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4
  provider: ^6.1.5+1
  http: ^1.6.0
  camera: ^0.11.3
  google_mlkit_text_recognition: ^0.15.1
  path_provider: ^2.1.5
  path: ^1.9.1
  image_picker: ^1.2.1
  image: ^4.7.2
  package_info_plus: ^8.3.1
  table_calendar: ^3.2.0
  flutter_secure_storage: ^10.0.0
  google_maps_cluster_manager_2: ^3.2.0
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  screenshot: ^3.0.0
  share_plus: ^10.0.0
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  google_sign_in: ^6.2.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icon/
    - .env
